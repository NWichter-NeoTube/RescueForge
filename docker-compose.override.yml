# Development overrides — automatically loaded by `docker compose up`
# For production (Coolify), only docker-compose.yml is used.
services:
  backend:
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - ./testdata:/app/testdata
    env_file:
      - .env

  frontend:
    volumes:
      - ./frontend/src:/app/src
    env_file:
      - .env
